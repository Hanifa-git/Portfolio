    <script>
  // Get all the cards and modal elements
const cards = document.querySelectorAll('.card');
const modal = document.getElementById('modal');
const fullImage = document.getElementById('fullImage');

// Iterate over each card
cards.forEach(card => {
    const fullImageUrl = card.getAttribute('data-full-image');
    const viewFullButton = card.querySelector('.view-full-btn');

    // Function to show the button
    function showButton() {
        if (viewFullButton) {
            viewFullButton.style.display = 'block';
        }
    }

    // Function to hide the button
    function hideButton() {
        if (viewFullButton) {
            viewFullButton.style.display = 'none';
        }
    }

    // Handle card click (open/close the card)
    card.addEventListener('click', () => {
        // Check if the card is already open
        if (card.classList.contains('open')) {
            // If the card is already open, do nothing (button remains visible)
            return;
        }

        // Close all other cards
        cards.forEach(c => {
            if (c !== card) {
                c.classList.remove('open');
                const otherButton = c.querySelector('.view-full-btn');
                if (otherButton) {
                    otherButton.style.display = 'none'; // Hide button for other cards
                }
            }
        });

        // Open the clicked card and show the button
        card.classList.add('open');
        showButton(); // Show the button when the card is opened
    });

    // Handle "View Full" button click to open the modal
    if (viewFullButton) {
        viewFullButton.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent card click from firing when the button is clicked
            fullImage.src = fullImageUrl;
            modal.style.display = 'flex'; // Open the modal with the full image
        });
    }
});

// Close modal function
function closeModal() {
    modal.style.display = 'none';
}

// Close modal if the user clicks outside the image
modal.addEventListener('click', (event) => {
    if (event.target === modal) {
        closeModal();
    }
});
    

// Tabs functionality
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.section');
    
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                sections.forEach(sec => sec.classList.remove('active'));
    
                tab.classList.add('active');
                document.getElementById(tab.dataset.section).classList.add('active');
            });
        });
    </script>
