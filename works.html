<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="works.css">
</head>
<body>

    <!-- Tab Navigation -->
    <div class="tabs">
        <div class="tab active" data-section="works">Works</div>
        <div class="tab" data-section="Case-Study">Case Study</div>
        <div class="tab" data-section="Branding">Branding</div>
    </div>

    <!-- Sections -->
    <section id="works" class="section active ">
       
        <div class="wrapper">
            <div class="container">
                <input type="radio" name="slide1" id="c1" checked>
                <label for="c1" class="card">
                    <div class="row">
                        <div class="icon">1</div>
                        <div class="description">
                            <h4>Winter</h4>
                            <p>Winter has so much to offer - creative activities</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide1" id="c2">
                <label for="c2" class="card">
                    <div class="row">
                        <div class="icon">2</div>
                        <div class="description">
                            <h4>Digital Technology</h4>
                            <p>Gets better every day - stay tuned</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide1" id="c3">
                <label for="c3" class="card">
                    <div class="row">
                        <div class="icon">3</div>
                        <div class="description">
                            <h4>Globalization</h4>
                            <p>Help people all over the world</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide1" id="c4">
                <label for="c4" class="card">
                    <div class="row">
                        <div class="icon">4</div>
                        <div class="description">
                            <h4>New technologies</h4>
                            <p>Space engineering becomes more and more advanced</p>
                        </div>
                    </div>
                </label>
            </div>
        </div>
    </section>

    <section id="Case-Study" class="section ">
        
        <div class="wrapper">
            <div class="container">
                <input type="radio" name="slide2" id="p1" checked>
                <label for="p1" class="card">
                    <div class="row">
                        <div class="icon">1</div>
                        <div class="description">
                            <h4>AI Innovations</h4>
                            <p>Artificial intelligence is shaping the future</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide2" id="p2">
                <label for="p2" class="card">
                    <div class="row">
                        <div class="icon">2</div>
                        <div class="description">
                            <h4>Smart Cities</h4>
                            <p>Urban areas integrated with technology</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide2" id="p3">
                <label for="p3" class="card">
                    <div class="row">
                        <div class="icon">3</div>
                        <div class="description">
                            <h4>Virtual Reality</h4>
                            <p>Immersive experiences like never before</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide2" id="p4">
                <label for="p4" class="card">
                    <div class="row">
                        <div class="icon">4</div>
                        <div class="description">
                            <h4>Renewable Energy</h4>
                            <p>Future-proofing the planet with sustainability</p>
                        </div>
                    </div>
                </label>
            </div>
        </div>
    </section>

    <section id="Branding" class="section">
        
        <div class="wrapper">
            <div class="container">
                <input type="radio" name="slide3" id="a1" checked>
                <label for="a1" class="card">
                    <div class="row">
                        <div class="icon">1</div>
                        <div class="description">
                            <h4>Awards</h4>
                            <p>Recognizing outstanding work</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide3" id="a2">
                <label for="a2" class="card">
                    <div class="row">
                        <div class="icon">2</div>
                        <div class="description">
                            <h4>Milestones</h4>
                            <p>Big steps towards success</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide3" id="a3">
                <label for="a3" class="card">
                    <div class="row">
                        <div class="icon">3</div>
                        <div class="description">
                            <h4>Partnerships</h4>
                            <p>Collaboration for greater impact</p>
                        </div>
                    </div>
                </label>
                <input type="radio" name="slide3" id="a4">
                <label for="a4" class="card">
                    <div class="row">
                        <div class="icon">4</div>
                        <div class="description">
                            <h4>Community Impact</h4>
                            <p>Giving back to society</p>
                        </div>
                    </div>
                </label>
            </div>
        </div>
    </section>

    

    <script>
        const tabs = document.querySelectorAll('.tab');
        const sections = document.querySelectorAll('.section');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove active class from all tabs and sections
                tabs.forEach(t => t.classList.remove('active'));
                sections.forEach(sec => sec.classList.remove('active'));

                // Activate clicked tab and corresponding section
                tab.classList.add('active');
                document.getElementById(tab.dataset.section).classList.add('active');
            });
        });
    </script>

    

</body>
</html>
